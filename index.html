<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Conecta Aí</title>
</head>
<body>
    <header class="cabecalho">
        <h1>Confere Aí</h1>
        <nav>
            <a href="#" class="cabecalho-link">Inicio</a>
        </nav>
    </header>
    <main>
        <h2>Descubra a verdade passando o mouse</h2>
        <section>
        <article class="cartao">
            <div class="cartao-interno">
                <div class="cartao-frente">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR1bItjYAyKtPbx4ZAyz1fikqKyx_-akIpqVP01JD2Hg7lANkTbYc5JZDNB&s=10" alt=homem aranha" class="cartao-imagem">
                    <p>ele salva o mundo!</p>
                </div>

                    <img src="https://stories.cnnbrasil.com.br/wp-content/uploads/sites/9/2024/04/Reclam-7-1.png" alt=homem aranha"  class="cartao-imagem">
                    <p>ele solta teia</p>
                </div>
            </div>
        </article>
<article class="cartao">
            <div class="cartao-interno">
                <div class="cartao-frente">
                    <img src="https://i.pinimg.com/originals/b3/85/25/b3852502392fb687c0c455933d9d3074.png alt="miranha" class="cartao-imagem">
                    <p>ele e amado por todos !</p>
                </div>
                <div class="cartao-verso">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR1bItjYAyKtPbx4ZAyz1fikqKyx_-akIpqVP01JD2Hg7lANkTbYc5JZDNB&s=10" alt="miranha"  class="cartao-imagem">
                    <p>Pinguins não voam, mas são excelentes nadadores.</p>
                </div>
            </div>
        </article>

        </section>
    </main>
    <footer>
        <p>Projeto feito por Vivi</p>
    </footer>

</html>
