<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Conecta Aí</title>
</head>
<body>

    <header class="cabecalho">
        <h1>Confere Aí</h1>
        <nav>
            <a href="#" class="cabecalho-link">Início</a>
        </nav>
    </header>

    <main>
        <h2>Descubra a verdade passando o mouse</h2>

        <section>

            <article class="cartao">
                <div class="cartao-interno">
                    <div class="cartao-frente">
                        <img src="https://cdn.iset.io/assets/55268/produtos/57070/papel-de-parede-homem-aranha-na-teia03.jpg" alt="Homem-Aranha" class="cartao-imagem">
                        <p>Ele consegue saltar entre os prédios!</p>
                    </div>

                    <div class="cartao-verso">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRK_meUB2rFkxUXwo7xQ_MNgGNseCGtlRHN1HOKJWWrbg&s=10" alt="Homem-Aranha" class="cartao-imagem">
                        <p>O Homem-Aranha salva muitas pessoas com seus poderes.</p>
                    </div>
                </div>
            </article>

            <article class="cartao">
                <div class="cartao-interno">
                    <div class="cartao-frente">
                        <img src="https://cdn.iset.io/assets/55268/produtos/57070/papel-de-parede-homem-aranha-na-teia03.jpg" alt="Homem-Aranha" class="cartao-imagem">
                        <p>Ele é um verdadeiro herói!</p>
                    </div>

                    <div class="cartao-verso">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRK_meUB2rFkxUXwo7xQ_MNgGNseCGtlRHN1HOKJWWrbg&s=10" alt="Homem-Aranha" class="cartao-imagem">
                        <p>O Homem-Aranha usa suas teias para proteger a cidade.</p>
                    </div>
                </div>
            </article>

        </section>
    </main>

    <footer>
        <p>Projeto feito por Maria</p>
    </footer>

</body>
</html>
